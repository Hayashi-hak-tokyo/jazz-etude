<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudiments Drum Solo Etude - IDM & Syncopation</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ABCJS for Music Notation & Audio -->
    <script src="https://cdn.jsdelivr.net/npm/abcjs@6.3.0/dist/abcjs-basic-min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/abcjs@6.3.0/abcjs-audio.min.css">

    <style>
        .abcjs-css-warning { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f5; }
        #score-container svg { width: 100%; height: auto; display: block; }
        .abcjs-inline-audio { max-width: 100%; padding: 10px; }

        /* 楽譜上のダイナミクス記号(f, p, fp等)とアクセント記号(>)を非表示にする */
        .abcjs-decoration, .abcjs-articulation, .abcjs-dynamics {
            display: none !important;
        }
    </style>
</head>
<body class="p-4 md:p-8 text-zinc-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- MOTIF LIBRARY ---
        // e: High Tom, c: Snare, A: Floor Tom, F: Kick, f: Crash
        const MOTIF_LIBRARY = {
            straight: {
                rest: {
                    basic: [[["z2", "", ""]]],
                    advanced: [[["z2", "", ""]]],
                    extreme: [[["z2", "", ""]]]
                },
                acc_1: {
                    basic: [[["c", "R", "A"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "G"]]],
                    advanced: [
                        [["c", "R", "A"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "G"]],
                        [["e", "R", "A"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "G"]],
                        [["A", "R", "A"], ["c", "L", "G"], ["e", "R", "G"], ["c", "L", "G"]], // Tom orchestration
                        [["[!style=x!fF]", "R+K", "A"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "G"]]
                    ],
                    extreme: [
                        [["c", "R", "A"], ["c", "L", "G"], ["F", "K", "K"], ["F", "K", "K"]],
                        [["e", "R", "A"], ["c", "R", "G"], ["A", "L", "G"], ["e", "L", "G"], ["F", "K", "K"], ["F", "K", "K"]], // Tom Linear
                        [["c", "R", "A"], ["F", "K", "K"]],
                        [["c", "R", "A", "/"], ["c", "R", "G", "//"], ["c", "L", "G", "//"], ["c", "L", "G", "/"], ["F", "K", "K", "/"]]
                    ]
                },
                acc_2: {
                    basic: [[["c", "R", "G"], ["c", "L", "A"], ["c", "R", "G"], ["c", "L", "G"]]],
                    advanced: [
                        [["c", "R", "G"], ["c", "L", "A"], ["c", "R", "G"], ["c", "L", "G"]],
                        [["c", "R", "G"], ["A", "L", "A"], ["c", "R", "G"], ["c", "L", "G"]],
                        [["e", "R", "G"], ["A", "L", "A"], ["e", "R", "G"], ["c", "L", "G"]],
                        [["c", "R", "G"], ["[!style=x!fF]", "L+K", "A"], ["c", "R", "G"], ["c", "L", "G"]]
                    ],
                    extreme: [
                        [["F", "K", "K"], ["c", "L", "A"], ["c", "R", "G"], ["c", "R", "G"]],
                        [["F", "K", "K"], ["e", "L", "A"], ["c", "R", "G"], ["A", "L", "G"], ["c", "R", "G"], ["e", "L", "G"]],
                        [["F", "K", "K", "/"], ["A", "L", "A", "/"], ["c", "R", "G", "//"], ["c", "R", "G", "//"], ["c", "L", "G", "/"]]
                    ]
                },
                acc_3: {
                    basic: [[["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"]]],
                    advanced: [
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"]],
                        [["c", "R", "G"], ["c", "L", "G"], ["e", "R", "A"], ["c", "L", "G"]],
                        [["A", "R", "G"], ["e", "L", "G"], ["A", "R", "A"], ["c", "L", "G"]],
                        [["c", "R", "G"], ["c", "L", "G"], ["[!style=x!fF]", "R+K", "A"], ["c", "L", "G"]]
                    ],
                    extreme: [
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"], ["F", "K", "K"], ["F", "K", "K"]],
                        [["e", "R", "G"], ["c", "L", "G"], ["F", "K", "K"], ["A", "R", "A"], ["F", "K", "K"], ["c", "L", "G"]],
                        [["c", "R", "G", "//"], ["c", "R", "G", "//"], ["e", "L", "G", "/"], ["A", "R", "A", "/"], ["F", "K", "K", "/"]]
                    ]
                },
                acc_4: {
                    basic: [[["c", "R", "G"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "A"]]],
                    advanced: [
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "A"]],
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "G"], ["A", "L", "A"]],
                        [["e", "R", "G"], ["c", "L", "G"], ["A", "R", "G"], ["e", "L", "A"]],
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "G"], ["[!style=x!fF]", "L+K", "A"]]
                    ],
                    extreme: [
                        [["c", "R", "G"], ["c", "R", "G"], ["e", "L", "G"], ["A", "L", "G"], ["F", "K", "K"], ["c", "L", "A"]],
                        [["F", "K", "K"], ["F", "K", "K"], ["e", "R", "G"], ["A", "L", "A"]]
                    ]
                }
            },
            swing: {
                rest: { 
                    basic: [[["z2", "", ""]]], 
                    advanced: [[["z2", "", ""]]],
                    extreme: [[["z2", "", ""]]]
                },
                acc_1: {
                    basic: [[["c", "R", "A"], ["c", "L", "G"], ["c", "R", "G"]]],
                    advanced: [
                        [["c", "R", "A"], ["c", "L", "G"], ["c", "R", "G"]],
                        [["e", "R", "A"], ["c", "L", "G"], ["c", "R", "G"]],
                        [["A", "R", "A"], ["e", "L", "G"], ["c", "R", "G"]],
                        [["[!style=x!fF]", "R+K", "A"], ["c", "L", "G"], ["c", "R", "G"]]
                    ]
                },
                acc_2: {
                    basic: [[["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"]]],
                    advanced: [
                        [["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"]],
                        [["c", "L", "G"], ["A", "R", "A"], ["c", "L", "G"]],
                        [["e", "L", "G"], ["A", "R", "A"], ["e", "L", "G"]],
                        [["c", "L", "G"], ["[!style=x!fF]", "L+K", "A"], ["c", "L", "G"]]
                    ]
                },
                acc_3: {
                    basic: [[["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"]]],
                    advanced: [
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"]],
                        [["c", "R", "G"], ["c", "L", "G"], ["e", "R", "A"]],
                        [["e", "R", "G"], ["A", "L", "G"], ["A", "R", "A"]],
                        [["c", "R", "G"], ["c", "L", "G"], ["[!style=x!fF]", "R+K", "A"]]
                    ]
                },
                acc_4: {
                    basic: [[["c", "L", "G"], ["c", "R", "G"], ["c", "L", "A"]]],
                    advanced: [
                        [["c", "L", "G"], ["c", "R", "G"], ["c", "L", "A"]],
                        [["c", "L", "G"], ["c", "R", "G"], ["A", "L", "A"]],
                        [["A", "L", "G"], ["c", "R", "G"], ["e", "L", "A"]],
                        [["c", "L", "G"], ["c", "R", "G"], ["[!style=x!fF]", "L+K", "A"]]
                    ]
                }
            }
        };

        function slotToNotesAndWords(slot) {
            let notes = "";
            let wordsArr = [];

            const processNote = (s, is16th = false, is32nd = false) => {
                let [note, sticking, dyn, duration] = s;
                if (note.includes("z")) return note + (duration || (is16th ? "/" : is32nd ? "//" : ""));

                let prefix = "";
                if (dyn === 'A') {
                    prefix = "!ff!!>!"; 
                    wordsArr.push(sticking.toUpperCase());
                } else if (dyn === 'G') {
                    prefix = "!ppp!";
                    wordsArr.push(sticking.toLowerCase());
                } else {
                    prefix = "!f!";
                    wordsArr.push(sticking.toUpperCase());
                }
                
                let suffix = duration || (is16th ? "/" : "");
                return prefix + note + suffix;
            };

            if (slot.length === 1) {
                notes = processNote(slot[0]);
            } else if (slot[0].length === 4) {
                notes = slot.map(s => processNote(s)).join("");
            } else if (slot.length === 6) {
                let noteArr = slot.map(s => processNote(s, true));
                notes = "(6" + noteArr.join("");
            } else if (slot.length === 3) {
                let noteArr = slot.map(s => processNote(s, false));
                notes = "(3" + noteArr.join("");
            } else if (slot.length === 2 || slot.length === 4) {
                let is16th = slot.length === 4;
                let noteArr = slot.map(s => processNote(s, is16th));
                notes = noteArr.join("");
            } else {
                notes = "z2";
            }
            
            return { notes, words: wordsArr.join(" ") };
        }

        function skeletonToAbc(skeleton, difficulty, feel, isTradeMode) {
            let notesStr = "";
            let wordsStr = "w: ";
            
            if (!skeleton) return "";

            for (let bar = 0; bar < 4; bar++) {
                let barNotes = [];
                let barWords = [];

                for (let beat = 0; beat < 4; beat++) {
                    const { key, isCrash, variationIndex } = skeleton[bar][beat];
                    const feelConfig = MOTIF_LIBRARY[feel];
                    const keyConfig = feelConfig[key] || feelConfig['rest'];
                    
                    let targetDifficulty = difficulty;
                    if (feel === 'swing' && difficulty === 'extreme') targetDifficulty = 'advanced';
                    
                    const motifOptions = keyConfig[targetDifficulty] || keyConfig['basic'];
                    let motifDef = motifOptions[variationIndex % motifOptions.length];
                    
                    // --- タム出現率の制限ロジックを緩和 (35%程度にアップ) ---
                    const hasToms = motifDef.some(step => step.some(part => part === 'e' || part === 'A'));
                    
                    // タムが含まれる場合、variationIndexの下一桁が3以下の時(約35%〜40%の確率)はそのまま採用。
                    // それ以外は Basic (スネア中心) に戻すことで、多すぎず少なすぎないバランスへ。
                    if (hasToms && (variationIndex % 10 >= 4)) {
                        const basicOptions = keyConfig['basic'];
                        motifDef = basicOptions[variationIndex % basicOptions.length];
                    }

                    let motif = JSON.parse(JSON.stringify(motifDef));
                    
                    if (difficulty !== 'basic' && isCrash && !motif[0][0].includes("z")) {
                        motif[0][0] = "[!style=x!fF]";
                        motif[0][1] = "R+K";
                        motif[0][2] = "A";   
                    }

                    let { notes, words } = slotToNotesAndWords(motif);
                    barNotes.push(notes);
                    if (words) barWords.push(words);
                }

                notesStr += barNotes.join(" ") + " | ";
                wordsStr += barWords.join(" ") + " | ";
            }

            if (isTradeMode) {
                notesStr = notesStr.slice(0, -3) + " |\n";
                wordsStr += "\n";
                const emptyBar = "z2 z2 z2 z2";
                notesStr += `${emptyBar} | ${emptyBar} | ${emptyBar} | ${emptyBar} |] `;
                wordsStr += " | | | |";
            } else {
                notesStr = notesStr.slice(0, -3) + " |] ";
            }

            return notesStr + "\n" + wordsStr;
        }

        function buildAbcString(abcBody, feel) {
            return `X:1
T:D.R.O.P. Solo Etude
M:4/4
L:1/8
Q:1/4=90
K:perc
%%MIDI channel 10
%%MIDI drummap f 49
%%MIDI drummap e 45
%%MIDI drummap c 38
%%MIDI drummap A 43
%%MIDI drummap F 36
%%stretchlast 1
%%vocalfont sans-serif 16
%%stafflines 5
` + abcBody;
        }

        const App = () => {
            const [difficulty, setDifficulty] = useState('basic');
            const [feel, setFeel] = useState('straight');
            const [isTradeMode, setIsTradeMode] = useState(false);
            const [skeleton, setSkeleton] = useState(null);
            const [abcString, setAbcString] = useState("");
            const [visualObj, setVisualObj] = useState(null);
            
            const scoreRef = useRef(null);
            const audioContainerRef = useRef(null);
            const synthControlRef = useRef(null);

            useEffect(() => {
                generateNewSkeleton();
                if (feel === 'swing' && difficulty === 'extreme') {
                    setDifficulty('advanced');
                }
            }, [feel]);

            const generateNewSkeleton = () => {
                const keys = Object.keys(MOTIF_LIBRARY[feel]);
                const weightedKeys = [];
                keys.forEach(k => {
                    if (k === 'rest') weightedKeys.push(k);
                    else weightedKeys.push(k, k, k);
                });

                let newSkeleton = [];
                for (let bar = 0; bar < 4; bar++) {
                    let barSkeleton = [];
                    for (let beat = 0; beat < 4; beat++) {
                        let isCrash = ((bar === 0 || bar === 2) && beat === 0 && Math.random() > 0.3);
                        let key = weightedKeys[Math.floor(Math.random() * weightedKeys.length)];
                        if (isCrash && key === 'rest') key = 'acc_1'; 
                        
                        let variationIndex = Math.floor(Math.random() * 100);
                        barSkeleton.push({ key, isCrash, variationIndex });
                    }
                    newSkeleton.push(barSkeleton);
                }
                setSkeleton(newSkeleton);
            };

            useEffect(() => {
                if (skeleton) {
                    const body = skeletonToAbc(skeleton, difficulty, feel, isTradeMode);
                    if (body) {
                        setAbcString(buildAbcString(body, feel));
                    }
                }
            }, [skeleton, difficulty, feel, isTradeMode]);

            useEffect(() => {
                if (abcString && scoreRef.current) {
                    const rendered = ABCJS.renderAbc(scoreRef.current, abcString, {
                        responsive: 'resize',
                        add_classes: true,
                        staffwidth: 900,
                        scale: 1.3, 
                        paddingtop: 15,
                        paddingbottom: 40
                    });
                    setVisualObj(rendered[0]);
                }
            }, [abcString]);

            useEffect(() => {
                if (visualObj && ABCJS.synth.supportsAudio() && audioContainerRef.current) {
                    audioContainerRef.current.innerHTML = "";
                    const controller = new ABCJS.synth.SynthController();
                    controller.load(audioContainerRef.current, null, {
                        displayLoop: true, displayRestart: true, displayPlay: true, displayProgress: true, displayWarp: true
                    });
                    controller.disable(true);
                    const synth = new ABCJS.synth.CreateSynth();
                    synth.init({ visualObj: visualObj }).then(() => {
                        controller.setTune(visualObj, false, { chordsOff: true, midiChannel: 10 });
                    }).catch(console.error);
                    synthControlRef.current = controller;
                }
            }, [visualObj]);

            return (
                <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6 mt-4">
                    <div className="text-center mb-6">
                        <h1 className="text-3xl font-bold text-zinc-800">D.R.O.P. Solo Etude</h1>
                    </div>

                    <div className="flex flex-col md:flex-row flex-wrap justify-center items-center gap-4 mb-6 bg-zinc-50 p-4 rounded-lg border border-zinc-200">
                        <div className="flex gap-4 flex-wrap justify-center">
                            <div className="flex bg-white rounded-md border border-zinc-300 overflow-hidden shadow-sm">
                                <button onClick={() => setFeel('straight')} className={`px-4 py-2 text-sm font-medium transition-colors ${feel === 'straight' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>Straight</button>
                                <button onClick={() => setFeel('swing')} className={`px-4 py-2 text-sm font-medium transition-colors ${feel === 'swing' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>Swing</button>
                            </div>

                            <div className="flex bg-white rounded-md border border-zinc-300 overflow-hidden shadow-sm">
                                <button onClick={() => setDifficulty('basic')} className={`px-4 py-2 text-sm font-medium transition-colors ${difficulty === 'basic' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>1. Basic</button>
                                <button onClick={() => setDifficulty('advanced')} className={`px-4 py-2 text-sm font-medium transition-colors ${difficulty === 'advanced' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>2. Orchestration</button>
                                {feel === 'straight' && (
                                    <button onClick={() => setDifficulty('extreme')} className={`px-4 py-2 text-sm font-medium transition-colors ${difficulty === 'extreme' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>3. Extreme (IDM)</button>
                                )}
                            </div>
                        </div>

                        <div className="flex gap-4 items-center">
                            <label className="flex items-center space-x-2 cursor-pointer bg-white px-4 py-2 rounded-md border border-zinc-300 shadow-sm hover:bg-zinc-50 transition-colors">
                                <input type="checkbox" checked={isTradeMode} onChange={(e) => setIsTradeMode(e.target.checked)} className="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500" />
                                <span className="text-sm font-medium text-zinc-700">🎧 4-Bar Trade</span>
                            </label>
                            <button onClick={generateNewSkeleton} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-md shadow-sm transition-colors">🔄 New Phrasing</button>
                        </div>
                    </div>

                    <div className="bg-white border-2 border-zinc-100 rounded-lg p-4 overflow-x-auto min-h-[150px]">
                        <div ref={scoreRef}></div>
                    </div>

                    <div className="mt-4 bg-slate-200 border border-slate-300 rounded-lg p-3 w-full max-w-2xl mx-auto shadow-inner">
                        <div ref={audioContainerRef} className="w-full"></div>
                    </div>

                    <div className="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="bg-indigo-50 border border-indigo-100 rounded-lg p-5">
                            <h3 className="font-bold text-indigo-900 mb-3 border-b border-indigo-200 pb-2">💡 練習のヒント</h3>
                            <ul className="text-sm text-indigo-800 space-y-3">
                                <li><strong>タムの出現率(アップ):</strong> 前回の制限を緩め、アクセント箇所の約35%〜40%程度でハイタム（上）やフロアタム（下）が絡むようにしました。ドラムセット全体を使ったより音楽的な移動が楽しめます。</li>
                                <li><strong>Trade Mode:</strong> 🎧 4-Bar Tradeにチェックを入れると、フレーズの後に4小節の休みが追加され、アプリとの4バース交換練習ができます。</li>
                            </ul>
                        </div>
                        <div className="bg-zinc-50 border border-zinc-200 rounded-lg p-5">
                            <h3 className="font-bold text-zinc-800 mb-3 border-b border-indigo-200 pb-2">🥁 手順の読み方</h3>
                            <ul className="text-sm text-zinc-600 space-y-1 font-mono bg-white p-2 rounded border border-zinc-100">
                                <li><strong>R / L / K :</strong> アクセント (強)</li>
                                <li><strong>r / l :</strong> ゴーストノート (弱)</li>
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
