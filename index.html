<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jazz Etude Generator</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (ブラウザ上でReactのコードを動かすためのツール) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- ABCjs (楽譜と音声) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-audio.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js"></script>

  <style>
    /* タイミングのズレによる不要な警告文を強制的に非表示にする */
    .abcjs-css-warning { display: none !important; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    /* ABCjs SVGのスタイル調整 */
    .abcjs-note { fill: #1f2937; }
    .abcjs-staff { fill: #1f2937; }
    
    /* SVGの下部が途切れるのを完全に防ぐための設定 */
    #paper { padding-bottom: 20px; }
    #paper svg { 
      overflow: visible !important; 
      margin-bottom: 40px !important; /* SVG自体に下部マージンを持たせる */
    }

    /* オーディオプレイヤーの調整 (Tailwindとの競合解消) */
    .abcjs-inline-audio { margin: 0; padding: 10px; display: flex; align-items: center; gap: 8px; justify-content: center; }
    
    /* 見えなくなっているボタンを強制的に表示させる（ボタン専用クラスに限定） */
    .abcjs-inline-audio .abcjs-btn {
       background-color: #e2e8f0 !important;
       border: 1px solid #cbd5e1 !important;
       border-radius: 8px !important;
       color: #334155 !important;
       width: 36px !important;
       height: 36px !important;
       cursor: pointer;
       display: inline-flex !important;
       align-items: center;
       justify-content: center;
       margin: 0 4px;
       padding: 0 !important;
    }
    .abcjs-inline-audio .abcjs-btn:hover {
       background-color: #cbd5e1 !important;
    }
    .abcjs-inline-audio .abcjs-btn svg {
       width: 20px !important;
       height: 20px !important;
       fill: #334155 !important;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const MusicIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M9 18V5l12-2v13"></path>
        <circle cx="6" cy="18" r="3"></circle>
        <circle cx="18" cy="16" r="3"></circle>
      </svg>
    );

    const RefreshIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
        <path d="M3 3v5h5"></path>
        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path>
        <path d="M16 21v-5h5"></path>
      </svg>
    );

    function App() {
      const [measureCount, setMeasureCount] = useState(8);
      const [chords, setChords] = useState(Array(32).fill(""));
      const [abcString, setAbcString] = useState("");
      const [audioAbcString, setAudioAbcString] = useState("");
      const [abcjsLoaded, setAbcjsLoaded] = useState(true);

      const audioRef = useRef(null);
      const synthRef = useRef(null);

      useEffect(() => {
        const initialChords = Array(32).fill("");
        const preset = ["Dm7", "G7", "Cmaj7", "Cmaj7", "Em7", "A7", "Dmaj7", "Dmaj7"];
        preset.forEach((c, i) => { initialChords[i] = c; });
        setChords(initialChords);
      }, []);

      useEffect(() => {
        if (abcjsLoaded && abcString && window.ABCJS) {
          // 表示用の楽譜（1段譜）をレンダリング
          window.ABCJS.renderAbc("paper", abcString, {
            responsive: "resize",
            add_classes: true,
            staffwidth: 800,
            paddingtop: 15,
            paddingbottom: 80, // 内部の余白
            paddingleft: 20,
            paddingright: 20,
          });

          // 音声再生のセットアップ
          if (window.ABCJS.synth.supportsAudio() && audioRef.current && audioAbcString) {
            const visualObjForAudio = window.ABCJS.renderAbc("*", audioAbcString, {})[0];

            // プレイヤーを初期化して、古い曲のキャッシュを完全にクリアする
            if (synthRef.current) {
              synthRef.current.pause();
              synthRef.current.disable(true);
            }
            audioRef.current.innerHTML = "";

            const synthControl = new window.ABCJS.synth.SynthController();
            synthControl.load(audioRef.current, null, {
              displayLoop: true,
              displayRestart: true,
              displayPlay: true,
              displayProgress: false, // シークバー（白いボックス）を非表示に
              displayWarp: true 
            });
            
            synthControl.setTune(visualObjForAudio, false, {
              chordsOff: true 
            }).catch(console.error);

            synthRef.current = synthControl;
          }
        }
      }, [abcString, audioAbcString, abcjsLoaded]);

      useEffect(() => {
        if (abcjsLoaded && chords[0] !== "" && abcString === "") {
          generateEtude();
        }
      }, [abcjsLoaded, chords]);

      const handleMeasureCountChange = (e) => {
        setMeasureCount(Number(e.target.value));
      };

      const handleChordChange = (index, value) => {
        const newChords = [...chords];
        newChords[index] = value;
        setChords(newChords);
      };

      const setPreset = (type) => {
        const newChords = Array(32).fill("");
        if (type === '251') {
          setMeasureCount(4);
          ["Dm7", "G7", "Cmaj7", "Cmaj7"].forEach((c, i) => newChords[i] = c);
        } else if (type === 'blues') {
          setMeasureCount(12);
          const blues = ["F7", "Bb7", "F7", "Cm7 F7", "Bb7", "Bdim7", "F7", "Am7 D7", "Gm7", "C7", "F7 D7", "Gm7 C7"];
          blues.forEach((c, i) => newChords[i] = c);
        } else if (type === 'autumn') {
          setMeasureCount(8);
          const autumn = ["Cm7", "F7", "Bbmaj7", "Ebmaj7", "Am7b5", "D7", "Gm7", "Gm7"];
          autumn.forEach((c, i) => newChords[i] = c);
        }
        setChords(newChords);
      };

      const getMidiOffset = (noteStr) => {
        const map = {
          'C': 0, 'C#': 1, 'Db': 1, 'D': 2, 'D#': 3, 'Eb': 3,
          'E': 4, 'F': 5, 'F#': 6, 'Gb': 6, 'G': 7, 'G#': 8, 'Ab': 8,
          'A': 9, 'A#': 10, 'Bb': 10, 'B': 11
        };
        return map[noteStr] || 0;
      };

      const getChordTones = (chordStr) => {
        if (!chordStr) return [0, 4, 7, 11].map(i => 60 + i); 

        const match = chordStr.match(/^[A-G][#b]?/);
        if (!match) return [0, 4, 7, 11].map(i => 60 + i);

        let root = match[0];
        let rootMidi = 60 + getMidiOffset(root); 
        
        let type = chordStr.substring(root.length);
        let intervals = [0, 4, 7]; 
        
        // 判定順序を修正: maj7がmの判定より先に来るようにしました
        if (type.includes('maj7') || type.includes('M7') || type.includes('△7')) intervals = [0, 4, 7, 11];
        else if (type.includes('m7b5') || type.includes('h')) intervals = [0, 3, 6, 10];
        else if (type.includes('dim')) intervals = [0, 3, 6, 9];
        else if (type.includes('mM7') || type.includes('m#7')) intervals = [0, 3, 7, 11];
        else if (type.includes('m7') || type.includes('-7')) intervals = [0, 3, 7, 10];
        else if (type.includes('m') || type.includes('-')) intervals = [0, 3, 7];
        else if (type.includes('7') || type.includes('9') || type.includes('13')) intervals = [0, 4, 7, 10];
        else if (type.includes('aug')) intervals = [0, 4, 8];
        
        return intervals.map(i => rootMidi + i);
      };

      const generateEtude = () => {
        let headerDisplay = "X: 1\n";
        headerDisplay += "T: Jazz Solo Etude\n";
        headerDisplay += "M: 4/4\n";
        headerDisplay += "L: 1/8\n";
        headerDisplay += "Q: 1/4=140\n";
        headerDisplay += "K: C\n"; 

        let headerAudio = headerDisplay;
        headerAudio += "%%staves (1 2)\n";
        headerAudio += "V: 1 clef=treble\n";
        headerAudio += "%%MIDI program 0\n"; 
        headerAudio += "%%MIDI control 7 127\n"; 
        headerAudio += "V: 2 clef=bass\n";
        headerAudio += "%%MIDI program 48\n"; 
        headerAudio += "%%MIDI control 7 30\n"; 

        const getAbcNote = (midi, measureAccidentalsRef) => {
          const isFlatKey = chords.some(c => c.includes('b') || c.includes('F'));
          let noteNames, defaultAccidentals;
          
          if (isFlatKey) {
            noteNames = ['C', 'D', 'D', 'E', 'E', 'F', 'G', 'G', 'A', 'A', 'B', 'B'];
            defaultAccidentals = ['', '_', '', '_', '', '', '_', '', '_', '', '_', '']; 
          } else {
            noteNames = ['C', 'C', 'D', 'D', 'E', 'F', 'F', 'G', 'G', 'A', 'A', 'B'];
            defaultAccidentals = ['', '^', '', '^', '', '', '^', '', '^', '', '^', '']; 
          }
          
          const octave = Math.floor(midi / 12) - 1;
          const noteClass = midi % 12;
          const baseName = noteNames[noteClass];
          const targetAcc = defaultAccidentals[noteClass];
          
          let abcName = baseName;
          if (octave === 3) abcName += ",";
          else if (octave === 5) abcName = abcName.toLowerCase();
          else if (octave >= 6) {
              abcName = abcName.toLowerCase();
              for(let k=6; k<=octave; k++) abcName += "'";
          }
          
          const key = baseName + octave;
          const currentAcc = measureAccidentalsRef[key] !== undefined ? measureAccidentalsRef[key] : '';
          
          let prefix = "";
          if (currentAcc !== targetAcc) {
              prefix = targetAcc === '' ? '=' : targetAcc;
              measureAccidentalsRef[key] = targetAcc;
          }
          return prefix + abcName;
        };

        const getAbcChord = (chordStr, measureAccidentalsRef) => {
          const tones = getChordTones(chordStr);
          const abcNotes = tones.map(midi => getAbcNote(midi - 12, measureAccidentalsRef));
          return "[" + abcNotes.join("") + "]";
        };

        let flatChords = [];
        for (let i = 0; i < measureCount; i++) {
            let chordStr = chords[i] || "Cmaj7";
            let chordList = chordStr.split(/\s+/).filter(c => c.length > 0);
            if (chordList.length === 0) chordList = ["Cmaj7"];
            
            for (let s = 0; s < 8; s++) {
                let currentChord = chordList[0];
                if (chordList.length >= 2 && s >= 4) currentChord = chordList[1];
                if (chordList.length >= 4) currentChord = chordList[Math.floor(s/2)];
                flatChords.push({ measure: i, slot: s, chord: currentChord });
            }
        }

        let totalSlots = flatChords.length;
        let notes = new Array(totalSlots).fill(null);
        let isRest = new Array(totalSlots).fill(false);

        let firstChord = flatChords[0].chord;
        let firstTones = getChordTones(firstChord);
        notes[0] = firstTones[0] + 12; 
        
        for (let index = 1; index < totalSlots; index++) {
            let prevTarget = notes[index - 1];
            let currentChord = flatChords[index].chord;
            let chordTones = getChordTones(currentChord);
            
            let target = prevTarget;
            let minDist = 999;
            
            let preferJump = Math.random() < 0.2;

            for(let oct = -1; oct <= 1; oct++) {
                chordTones.forEach(ct => {
                    let n = ct + (oct * 12);
                    if (n >= 55 && n <= 84) {
                        let dist = Math.abs(n - prevTarget);
                        if (n === prevTarget) dist += 10; 
                        
                        if (preferJump) {
                            let jumpScore = Math.abs(dist - 7); 
                            if (jumpScore < minDist) {
                                minDist = jumpScore;
                                target = n;
                            }
                        } else {
                            dist += Math.random() * 3; 
                            if (dist < minDist) {
                                minDist = dist;
                                target = n;
                            }
                        }
                    }
                });
            }
            notes[index] = target;
        }

        // アプローチノートの適用
        for (let index = 0; index < totalSlots - 1; index++) {
            if (flatChords[index].chord !== flatChords[index + 1].chord) {
                let nextTarget = notes[index + 1];
                let appType = Math.random();
                let approachNote = nextTarget;
                
                // アプローチノートの余計な制限を取り払い、本来のビバップアプローチに戻しました
                if (appType < 0.3) approachNote = nextTarget - 1; 
                else if (appType < 0.6) approachNote = nextTarget + 1; 
                else if (appType < 0.8) approachNote = nextTarget + 2; 
                else approachNote = nextTarget - 2; 

                if (approachNote < 55) approachNote += 12;
                if (approachNote > 84) approachNote -= 12;
                
                notes[index] = approachNote;
            }
        }

        for (let i = 0; i < measureCount; i++) {
            let slots = [1,1,1,1,1,1,1,1];
            let patternRand = Math.random();
            
            if (i < measureCount - 1) { 
                if (patternRand < 0.15) slots = [0,1,1,1,1,1,1,1]; 
                else if (patternRand < 0.25) slots = [1,1,0,1,1,1,1,1]; 
                else if (patternRand < 0.35) slots = [1,1,1,1,0,1,1,1]; 
                else if (patternRand < 0.40) slots = [0,0,1,1,1,1,1,1]; 
                else if (patternRand < 0.45) slots = [1,1,1,1,1,1,0,1]; 
            }

            for (let s = 0; s < 8; s++) {
                if (slots[s] === 0) isRest[i * 8 + s] = true;
            }
        }

        let abcDisplay = headerDisplay;
        let abcAudio = headerAudio;

        let abcV1 = ""; 
        let audioV1 = "[V: 1] "; 
        let audioV2 = "[V: 2] "; 

        for (let i = 0; i < measureCount; i++) {
          let abcMeasureV1 = "";
          let abcMeasureV2 = "";
          let measureAccidentalsV1 = {}; 
          let measureAccidentalsV2 = {};

          let chordsInMeasure = (chords[i] || "Cmaj7").split(/\s+/).filter(c => c.length > 0);
          if (chordsInMeasure.length === 0) chordsInMeasure = ["Cmaj7"];

          let dynamicsV2 = (i === 0) ? "!ppp! " : "";

          if (i === measureCount - 1) {
              abcMeasureV2 += dynamicsV2 + getAbcChord(chordsInMeasure[0], measureAccidentalsV2) + "8 |]";
          } else {
              if (chordsInMeasure.length === 1) {
                  abcMeasureV2 += dynamicsV2 + getAbcChord(chordsInMeasure[0], measureAccidentalsV2) + "8";
              } else {
                  let c1 = getAbcChord(chordsInMeasure[0], measureAccidentalsV2);
                  let c2 = getAbcChord(chordsInMeasure[1], measureAccidentalsV2);
                  abcMeasureV2 += dynamicsV2 + c1 + "4 " + c2 + "4";
              }
              abcMeasureV2 += " | ";
          }

          if (i === measureCount - 1) {
             let lastChord = flatChords[i * 8].chord;
             let tones = getChordTones(lastChord);
             let availableTones = tones.length > 1 ? tones.slice(1) : tones;
             let prevNote = notes[i * 8 - 1] || 64;
             
             let closest = availableTones[0] + 12;
             let minDist = 999;
             for(let oct = -1; oct <= 1; oct++) {
                availableTones.forEach(t => {
                    let n = t + (oct * 12) + 12; 
                    if (n >= 55 && n <= 84) { 
                        if (Math.abs(n - prevNote) < minDist) {
                           minDist = Math.abs(n - prevNote);
                           closest = n;
                        }
                    }
                });
             }
             abcMeasureV1 += `"${lastChord}"` + getAbcNote(closest, measureAccidentalsV1) + "8 |]";
          } else {
             for (let s = 0; s < 8; s++) {
                let index = i * 8 + s;
                
                if (s === 0) abcMeasureV1 += `"${chordsInMeasure[0]}"`;
                if (s === 4 && chordsInMeasure.length >= 2) abcMeasureV1 += `"${chordsInMeasure[1]}"`;

                if (isRest[index]) {
                   abcMeasureV1 += "z";
                } else {
                   abcMeasureV1 += getAbcNote(notes[index], measureAccidentalsV1);
                }
                
                if (s === 3) abcMeasureV1 += " ";
             }
             abcMeasureV1 += " | ";
          }

          abcV1 += abcMeasureV1;
          audioV1 += abcMeasureV1;
          audioV2 += abcMeasureV2;

          if ((i + 1) % 4 === 0 || i === measureCount - 1) {
              abcDisplay += abcV1 + "\n";
              abcV1 = "";

              abcAudio += audioV1 + "\n" + audioV2 + "\n";
              audioV1 = "[V: 1] ";
              audioV2 = "[V: 2] ";
          }
        }

        setAbcString(abcDisplay);
        setAudioAbcString(abcAudio);
      };

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            
            <header className="flex items-center gap-3 border-b pb-4">
              <div className="p-3 bg-blue-600 text-white rounded-xl shadow-sm">
                <MusicIcon />
              </div>
              <div>
                <h1 className="text-2xl font-bold text-gray-900">Jazz Etude Generator</h1>
                <p className="text-sm text-gray-500">コード進行からジャズのアドリブソロ（エチュード）を自動生成</p>
              </div>
            </header>

            <div className="flex flex-col gap-6">
              
              <div className="w-full space-y-6 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">
                      小節数: {measureCount} 小節
                    </label>
                    <input 
                      type="range" 
                      min="4" 
                      max="32" 
                      step="4" 
                      value={measureCount}
                      onChange={handleMeasureCountChange}
                      className="w-full accent-blue-600"
                    />
                    <div className="flex justify-between text-xs text-gray-400 mt-1">
                      <span>4</span>
                      <span>16</span>
                      <span>32</span>
                    </div>
                  </div>

                  <div>
                    <span className="block text-sm font-semibold text-gray-700 mb-2">プリセット進行</span>
                    <div className="flex flex-wrap gap-2">
                      <button onClick={() => setPreset('251')} className="px-3 py-1.5 text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition">2-5-1 (4小節)</button>
                      <button onClick={() => setPreset('blues')} className="px-3 py-1.5 text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition">ブルース (12小節)</button>
                      <button onClick={() => setPreset('autumn')} className="px-3 py-1.5 text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition">枯葉風 (8小節)</button>
                    </div>
                  </div>
                </div>

                <hr className="border-gray-100" />

                <div>
                  <span className="block text-sm font-semibold text-gray-700 mb-2">コード進行</span>
                  <p className="text-xs text-gray-500 mb-3">※1小節に2つコードを入れる場合は「Dm7 G7」のようにスペースで区切ってください。</p>
                  
                  <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-8 gap-2 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                    {Array.from({ length: measureCount }).map((_, i) => (
                      <div key={i} className="flex flex-col">
                        <span className="text-[10px] text-gray-400 font-mono">{i + 1}</span>
                        <input 
                          type="text" 
                          value={chords[i]} 
                          onChange={(e) => handleChordChange(i, e.target.value)}
                          placeholder="例: Cmaj7"
                          className="border border-gray-200 p-2 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition shadow-sm"
                        />
                      </div>
                    ))}
                  </div>
                </div>

                <button 
                  onClick={generateEtude}
                  className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl shadow-sm transition active:scale-[0.98]"
                >
                  <RefreshIcon />
                  エチュードを生成
                </button>
              </div>

              <div className="w-full bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                <div className="bg-gray-50 border-b border-gray-100 px-4 py-3 flex justify-between items-center">
                  <span className="text-sm font-semibold text-gray-700">生成された五線譜</span>
                  <span className="text-xs text-gray-500 px-2 py-1 bg-gray-200 rounded-md">Bebop Style</span>
                </div>
                
                <div className={abcString ? "bg-white border-b border-gray-100 px-4 py-3 flex justify-center w-full" : "hidden"}>
                  <div ref={audioRef} className="w-full max-w-3xl"></div>
                </div>
                
                <div className="p-4 pb-12 overflow-x-auto flex-1 flex justify-center">
                  {abcString ? (
                    <div id="paper" className="min-w-full lg:min-w-[800px] flex justify-center"></div>
                  ) : (
                    <div className="h-full flex items-center justify-center text-gray-400 flex-col gap-3 min-h-[300px]">
                      <MusicIcon />
                      <p>「エチュードを生成」ボタンを押してください</p>
                    </div>
                  )}
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
