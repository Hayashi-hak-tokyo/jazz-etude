                    ]

                    paradiddle_diddle: [[["c", "R", "A", "//"], ["c", "L", "A", "//"], ["e", "r", "G", "//"], ["e", "r", "G", "//"], ["A", "l", "G", "//"], ["A", "l", "G", "//"]]],
                    double_stroke: [[["c", "r", "G", "//"], ["c", "r", "G", "//"], ["e", "l", "G", "//"], ["e", "l", "G", "//"], ["A", "r", "G", "//"], ["A", "r", "G", "//"]]],
                    para_special_1: [[["c", "r", "G", "//"], ["c", "l", "G", "//"], ["e", "r", "G", "//"], ["e", "r", "G", "//"], ["e", "l", "G", "//"], ["c", "r", "G", "//"]]],
                    para_special_2: [[["e", "l", "G", "//"], ["e", "l", "G", "//"], ["c", "r", "G", "//"], ["c", "l", "G", "//"], ["A", "r", "G", "//"], ["A", "r", "G", "//"]]]
                }

        // --- 手順・オーケストレーションガード ---
        function applyStickingGuard(fullPhrase) {
            let lastHand = "";
            let lastActualPitch = ""; 
            let lastHandIdx = -1;
            let handCount = 0;
            let kickCount = 0;

            for (let i = 0; i < fullPhrase.length; i++) {
                let hit = fullPhrase[i];
                if (!hit || hit[0].includes("z")) continue; 

                let sticking = hit[1] || "";
                let hasKick = sticking.includes("K");
                let hand = "";
                if (sticking.toUpperCase().includes("R")) hand = "R";
                else if (sticking.toUpperCase().includes("L")) hand = "L";

                if (hand !== "") {
                    if (hand === lastHand) {
                        hit[2] = 'G'; // ダブルは原則ゴースト
                        if (lastHandIdx !== -1) fullPhrase[lastHandIdx][2] = 'G'; 

                        // 移動ダブル禁止
                        let targetPitch = lastActualPitch;
                        if (!targetPitch.includes("style=x")) {
                            if (!hit[0].includes("z")) hit[0] = targetPitch;
                        }
                        
                        handCount++;
                        if (handCount > 2) {
                            let newBase = (hand === "R") ? "L" : "R";
                            hit[1] = hit[1].replace(/[RrLl]/g, newBase.toLowerCase());
                            lastHand = newBase;
                            handCount = 1;
                            lastHandIdx = i;
                        } else {
                            lastHandIdx = i;
                        }
                    } else {
                        handCount = 1;
                        lastHand = hand;
                        lastHandIdx = i;
                    }
                } else if (sticking === "K" || sticking === "") {
                    handCount = 0;
                    lastHand = "";
                    lastHandIdx = -1;
                }

                if (!hit[0].includes("z")) {
                    lastActualPitch = hit[0];
                }

                // キック連打制限
                if (hasKick) {
                    kickCount++;
                    if (kickCount > 2) {
                        let updatedSticking = sticking.replace("+K", "").replace("K", "");
                        if (hit[0].includes("F") || hit[0].includes("f")) {
                            hit[0] = "c"; 
                            let nextHand = (lastHand === "R") ? "l" : "r";
                            hit[1] = nextHand;
                            hit[2] = 'G';
                            lastHand = nextHand.toUpperCase();
                            handCount = 1;
                        } else {
                            hit[1] = updatedSticking;
                        }
                        kickCount = 0; 
                    }
                } else {
                    kickCount = 0;
                }
            }
            return fullPhrase;
        }

        function slotToNotesAndWords(slot, feel) {
            let notes = "";
            let wordsArr = [];
            const processNote = (s, force16th = false) => {
                let [note, sticking, dyn, duration] = s;
                if (note.includes("z")) {
                    wordsArr.push("_");
                    return note + (duration || (force16th ? "/" : ""));
                }
                
                let velocity = (dyn === 'A') ? "!ff!" : "!ppp!";
                let prefix = (dyn === 'A') ? "!>!" + velocity : velocity;
                
                let displaySticking = sticking;
                if (displaySticking) {
                    // Kの省略
                    if (/[RL]/i.test(displaySticking)) displaySticking = displaySticking.replace(/\+?K/gi, "");
                    if (displaySticking.toUpperCase() === "K") {
                        displaySticking = "K";
                    } else {
                        displaySticking = (dyn !== 'A') ? displaySticking.toLowerCase() : displaySticking.toUpperCase();
                    }
                }
                wordsArr.push(displaySticking || "_");
                return prefix + note + (duration || (force16th ? "/" : ""));
            };

            if (slot.length === 1) {
                notes = processNote(slot[0]);
            } else if (feel === 'swing') {
                if (slot.length === 6) notes = "(6" + slot.map(s => processNote(s)).join("");
                else if (slot.length === 4) notes = slot.map(s => processNote(s)).join("");
                else notes = "(3" + slot.map(s => processNote(s)).join("");
            } else if (slot.length === 3) {
                const has16th = slot.some(s => s[3] === "/");
                notes = has16th ? slot.map(s => processNote(s)).join("") : "(3" + slot.map(s => processNote(s)).join("");
            } else {
                notes = slot.map(s => processNote(s, slot.length === 4)).join("");
            }
            return { notes, words: wordsArr.join(" ") };
        }

        function skeletonToAbc(skeleton, difficulty, feel, isTradeMode) {
            if (!skeleton) return "";
            const generateSystem = (bars) => {
                let flatPhrase = [];
                bars.forEach((barSkeleton, barIdx) => {
                    let prevWas6 = false;
                    barSkeleton.forEach((beatSkeleton, beatIdx) => {
                        const { key, isCrash, variationIndex } = beatSkeleton;
                        const feelConfig = MOTIF_LIBRARY[feel];
                        
                        let keyToUse = key;
                        if (difficulty === 'extreme' && feel === 'straight' && key === 'rest') {
                            keyToUse = (variationIndex % 100 < 25) ? 'glitch_triplet' : 'glitch_fill';
                        }
                        
                        const keyConfig = feelConfig[keyToUse] || feelConfig['rest'];
                        
                        let options;
                        if (feel === 'swing' && difficulty === 'advanced_elvin') {
                            // 確率制御
                            let prob = 0;
                            if (barIdx === 0) prob = 0.01;
                            else if (barIdx === 1) prob = 0.05;
                            else if (barIdx === 2) prob = 0.08;
                            else if (barIdx === 3) prob = 0.10;

                            let isComplex = Math.random() < prob;
                            
                            if (isComplex) {
                                let pool = [];
                                if (keyConfig.advanced_elvin) {
                                    pool = keyConfig.advanced_elvin.filter(m => m.length === 4 || m.length === 6);
                                }
                                if (pool.length === 0 || Math.random() < 0.5) {
                                    let sixPool = [...feelConfig.six_tuples.six_stroke, ...feelConfig.six_tuples.paradiddle_diddle, ...feelConfig.six_tuples.double_stroke, ...feelConfig.six_tuples.para_special_1];
                                    options = [sixPool[variationIndex % sixPool.length]];
                                } else {
                                    options = [pool[variationIndex % pool.length]];
                                }
                                prevWas6 = (options[0].length === 6);
                            } else {
                                options = keyConfig.advanced_elvin || keyConfig.advanced || keyConfig.basic;
                                options = options.filter(m => m.length === 3);
                                if (options.length === 0) options = keyConfig.basic;
                                prevWas6 = false;
                            }
                        } else {
                            options = keyConfig[difficulty] || keyConfig['basic'];
                        }

                        if (!options || options.length === 0) {
                            options = keyConfig['basic'] || feelConfig['rest']['basic'];
                        }

                        let motif = JSON.parse(JSON.stringify(options[variationIndex % options.length]));
                        
                        // Basicモード防護ガード
                        if (difficulty === 'basic') {
                            motif.forEach(step => {
                                if (!step[0].includes("z")) {
                                    step[0] = "c";
                                    if (step[1]) step[1] = step[1].replace(/\+K/g, "").replace(/K/g, "");
                                }
                            });
                        }

                        if (difficulty !== 'basic' && isCrash) {
                            for (let i = 0; i < motif.length; i++) { 
                                if (motif[i][2] === 'A') { 
                                    motif[i][0] = "[!style=x!fF]"; 
                                    motif[i][1] = (motif[i][1] || "R").replace(/\+?K/gi, "") + "+K"; 
                                    break; 
                                } 
                            }
                        }
                        flatPhrase.push({ motif, isBarEnd: (beatIdx === 3) });
                    });
                });
                
                let allSteps = []; flatPhrase.forEach(m => allSteps.push(...m.motif));
                applyStickingGuard(allSteps);
                
                let notesStr = "", wordsStr = "w: ", stepIdx = 0;
                flatPhrase.forEach(m => {
                    let motifToProcess = []; for(let i=0; i<m.motif.length; i++) motifToProcess.push(allSteps[stepIdx++]);
                    let { notes, words } = slotToNotesAndWords(motifToProcess, feel);
                    notesStr += notes + " "; wordsStr += words + " "; if (m.isBarEnd) { notesStr += "| "; wordsStr += "| "; }
                });
                return notesStr + "\n" + wordsStr + "\n";
            };
            let body = generateSystem(skeleton);
            if (isTradeMode) {
                body += "z2 z2 z2 z2 | z2 z2 z2 z2 | z2 z2 z2 z2 | z2 z2 z2 z2 |] \nw: | | | | \n";
            } else {
                body = body.trim().slice(0, -1) + "] \n";
            }
            return body;
        }

        const App = () => {
            const [feel, setFeel] = useState('straight');
            const [difficulty, setDifficulty] = useState('basic');
            const [isTradeMode, setIsTradeMode] = useState(false);
            const [skeleton, setSkeleton] = useState(null);
            const [abcString, setAbcString] = useState("");
            const [visualObj, setVisualObj] = useState(null);
            const scoreRef = useRef(null);
            const audioContainerRef = useRef(null);

            const unlockAudio = async () => {
                const context = ABCJS.synth.activeAudioContext();
                if (context && context.state === 'suspended') await context.resume();
            };

            useEffect(() => { 
                generateNewSkeleton(); 
                if (difficulty === 'extreme' || difficulty === 'advanced_elvin') {
                    setDifficulty(feel === 'straight' ? 'extreme' : 'advanced_elvin');
                }
            }, [feel]);

            const generateNewSkeleton = () => {
                unlockAudio();
                const accentKeys = Object.keys(MOTIF_LIBRARY[feel]).filter(k => k.startsWith('acc'));
                let newSkeleton = [], prevWasRest = false;
                for (let bar = 0; bar < 4; bar++) {
                    let barSkeleton = [];
                    for (let beat = 0; beat < 4; beat++) {
                        let key = (prevWasRest || Math.random() >= 0.3) ? accentKeys[Math.floor(Math.random() * accentKeys.length)] : 'rest';
                        prevWasRest = (key === 'rest');
                        let isCrash = (beat === 0 && key !== 'rest' && Math.random() < (bar === 0 ? 0.8 : 0.4));
                        barSkeleton.push({ key, isCrash, variationIndex: Math.floor(Math.random() * 100) });
                    }
                    newSkeleton.push(barSkeleton);
                }
                setSkeleton(newSkeleton);
            };

            useEffect(() => {
                if (skeleton) {
                    const body = skeletonToAbc(skeleton, difficulty, feel, isTradeMode);
                    setAbcString(`X:1\nT:D.R.O.P. Solo Etude\nM:4/4\nL:1/8\nQ:1/4=90\nK:perc\n%%MIDI channel 10\n%%MIDI drummap f 49\n%%MIDI drummap e 45\n%%MIDI drummap c 38\n%%MIDI drummap A 43\n%%MIDI drummap F 36\n%%articulation u\n%%stretchlast 1\n%%stafflines 5\n` + body);
                }
            }, [skeleton, difficulty, feel, isTradeMode]);

            useEffect(() => {
                if (abcString && scoreRef.current) {
                    const rendered = ABCJS.renderAbc(scoreRef.current, abcString, { responsive: 'resize', add_classes: true, staffwidth: 900, scale: 1.3 });
                    setVisualObj(rendered[0]);
                }
            }, [abcString]);

            useEffect(() => {
                if (visualObj && audioContainerRef.current) {
                    audioContainerRef.current.innerHTML = "";
                    const controller = new ABCJS.synth.SynthController();
                    controller.load(audioContainerRef.current, null, { displayLoop: true, displayRestart: true, displayPlay: true, displayProgress: true, displayWarp: true });
                    new ABCJS.synth.CreateSynth().init({ visualObj: visualObj }).then(() => controller.setTune(visualObj, false, { chordsOff: true, midiChannel: 10 }));
                }
            }, [visualObj]);

            return (
                <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-3 md:p-6 mt-2 md:mt-4 printable-area">
                    <div className="flex justify-between items-center mb-4 md:mb-6">
                        <h1 className="text-xl md:text-3xl font-bold text-zinc-800">D.R.O.P. Solo Etude</h1>
                        <button onClick={() => window.print()} className="no-print bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-1.5 px-3 rounded-md shadow-sm transition-colors text-xs md:text-sm">📄 PDF保存 / 印刷</button>
                    </div>
                    <div className="no-print flex flex-col gap-4 mb-6 bg-zinc-50 p-4 rounded-lg border border-zinc-200">
                        <div className="flex flex-wrap justify-center gap-3">
                            <div className="flex bg-white rounded-md border border-zinc-300 overflow-hidden shadow-sm">
                                <button onClick={() => { unlockAudio(); setFeel('straight'); }} className={`px-4 py-2 text-sm font-medium transition-colors ${feel === 'straight' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>Straight</button>
                                <button onClick={() => { unlockAudio(); setFeel('swing'); }} className={`px-4 py-2 text-sm font-medium transition-colors ${feel === 'swing' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>Swing</button>
                            </div>
                            <div className="flex bg-white rounded-md border border-zinc-300 overflow-hidden shadow-sm">
                                <button onClick={() => { unlockAudio(); setDifficulty('basic'); }} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium transition-colors ${difficulty === 'basic' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>1. Basic</button>
                                <button onClick={() => { unlockAudio(); setDifficulty('advanced'); }} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium transition-colors ${difficulty === 'advanced' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>2. Orchestration</button>
                                <button onClick={() => { unlockAudio(); setDifficulty(feel === 'straight' ? 'extreme' : 'advanced_elvin'); }} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium transition-colors ${difficulty === (feel === 'straight' ? 'extreme' : 'advanced_elvin') ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>
                                    {feel === 'straight' ? '3. Extreme' : '3. Advanced'}
                                </button>
                            </div>
                        </div>
                        <div className="flex flex-wrap justify-center gap-3 items-center">
                            <label className="flex items-center space-x-2 cursor-pointer bg-white px-4 py-2 rounded-md border border-zinc-300 shadow-sm hover:bg-zinc-50 transition-colors">
                                <input type="checkbox" checked={isTradeMode} onChange={(e) => setIsTradeMode(e.target.checked)} className="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500" />
                                <span className="text-xs md:text-sm font-medium text-zinc-700">🎧 4-Bar Trade</span>
                            </label>
                            <button onClick={generateNewSkeleton} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-md shadow-sm transition-colors text-sm">🔄 New Phrasing</button>
                        </div>
                    </div>
                    <div className="bg-white border-2 border-zinc-100 rounded-lg p-2 md:p-4 overflow-x-auto min-h-[150px]"><div id="score-container" ref={scoreRef}></div></div>
                    <div className="no-print mt-4 bg-slate-200 border border-slate-300 rounded-lg p-2 w-full max-w-2xl mx-auto shadow-inner"><div ref={audioContainerRef} className="w-full"></div></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
